<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: lerobot:;
        media-src 'self' blob: lerobot:;
        font-src 'self' data:;
        connect-src 'self' lerobot: ws: http://localhost:*;
        worker-src 'self' blob:;
        object-src 'none';
        base-uri 'self';
        frame-ancestors 'none';
      "
    />
    <title>LeRobot Viewer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
